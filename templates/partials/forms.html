{% macro csrf_field() -%}
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
{%- endmacro %}

{% macro error_list(errors) -%}
    {% if errors %}
        <div class="form-errors" role="alert">
            {% for error in errors %}
                <p>{{ error }}</p>
            {% endfor %}
        </div>
    {% endif %}
{%- endmacro %}
