<header class="site-header">
    <div class="header-inner">
        <a class="brand" href="{{ url_for('main.home') }}" aria-label="Home">
            <img class="brand-logo" src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="{{ site_name }} logo">
            <div class="brand-copy">
                <strong>{{ site_name }}</strong>
            </div>
        </a>
        <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-controls="site-nav">
            <span class="nav-toggle-line"></span>
            <span class="nav-toggle-line"></span>
            <span class="nav-toggle-line"></span>
            <span class="sr-only">Open navigation</span>
        </button>
        <button class="sidebar-toggle" type="button" data-sidebar-toggle aria-expanded="false" aria-controls="site-sidebar" aria-label="Toggle sidebar">
            <span class="sidebar-toggle-line"></span>
            <span class="sidebar-toggle-line"></span>
            <span class="sidebar-toggle-line"></span>
        </button>
        <nav class="site-nav" id="site-nav" data-site-nav>
            <a href="{{ url_for('main.home') }}">Home</a>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
                <a href="{{ url_for('posters.index') }}">Posters</a>
                <a href="{{ url_for('movies.index') }}">Movies</a>
                {% if current_user.is_admin_role %}
                    <a href="{{ url_for('main.users') }}">Users</a>
                    <a href="{{ url_for('main.founders') }}">Founders</a>
                {% endif %}
                <a href="{{ url_for('main.profile') }}">Profile</a>
                <form class="nav-form" method="post" action="{{ url_for('auth.logout') }}">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <button type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{{ url_for('auth.login') }}">Login</a>
                <a class="nav-cta" href="{{ url_for('auth.register') }}">Register</a>
            {% endif %}
        </nav>
        {% if not current_user.is_authenticated %}
            <div class="header-actions">
                <a class="button secondary" href="{{ url_for('auth.login') }}">Log in</a>
                <a class="button primary" href="{{ url_for('auth.register') }}">Register</a>
            </div>
        {% endif %}
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme">🌗</button>
    </div>
</header>
