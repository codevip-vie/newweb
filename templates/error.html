{% extends "base.html" %}

{% block title %}{{ title }} - {{ site_name }}{% endblock %}

{% block content %}
<section class="error-shell">
    <span class="eyebrow">Error</span>

    <a class="button primary" href="{{ url_for('main.home') }}">Return Home</a>
</section>
{% endblock %}
