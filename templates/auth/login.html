{% extends "base.html" %}
{% from "partials/forms.html" import csrf_field, error_list %}

{% block title %}Login - {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-panel">
        <span class="eyebrow">Welcome Back</span>
        <h1>Login</h1>
        {{ error_list(errors) }}
        <form method="post" novalidate>
            {{ csrf_field() }}
            <input type="hidden" name="next" value="{{ next_url }}">
            <label for="identifier">Username or email</label>
            <input id="identifier" name="identifier" type="text" value="{{ values.identifier }}" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button class="button primary full" type="submit">Login</button>
        </form>
        <p class="form-switch">New here? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
    </div>
</section>
{% endblock %}
