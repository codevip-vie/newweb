{% extends "base.html" %}
{% from "partials/forms.html" import csrf_field, error_list %}

{% block title %}Register - {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-panel">
        <span class="eyebrow">Start Managing</span>
        <h1>Register</h1>
        {{ error_list(errors) }}
        <form method="post" novalidate>
            {{ csrf_field() }}
            <label for="username">Username</label>
            <input id="username" name="username" type="text" value="{{ values.username }}" minlength="3" maxlength="30" autocomplete="username" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" value="{{ values.email }}" autocomplete="email" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>

            <label for="confirm_password">Confirm password</label>
            <input id="confirm_password" name="confirm_password" type="password" minlength="8" autocomplete="new-password" required>

            <button class="button primary full" type="submit">Create Account</button>
        </form>
        <p class="form-switch">Already registered? <a href="{{ url_for('auth.login') }}">Login</a></p>
    </div>
</section>
{% endblock %}
